name: Supabase heartbeat

# Run on a schedule and manually via GitHub Actions UI.
on:
  schedule:
    # Every 3 days at midnight UTC.
    - cron: '0 0 */3 * *'
  workflow_dispatch: []

jobs:
  heartbeat:
    name: Supabase database heartbeat
    runs-on: ubuntu-latest

    steps:
      - name: Send lightweight Supabase REST API request
        run: |
          echo "Pinging Supabase to keep free-tier database active..."

          HTTP_STATUS=$(curl --silent --show-error --fail --output /dev/null \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Accept: application/json" \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" \
            -w "%{http_code}")

          echo "Supabase REST API HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Supabase heartbeat failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Supabase heartbeat succeeded."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
